<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dark HUB Showcase</title>
  <style>
    :root {
      --bg: #040808;
      --bg-2: #07110f;
      --surface: rgba(11, 24, 20, 0.92);
      --surface-border: rgba(184, 145, 78, 0.18);
      --text: #f2efe8;
      --muted: rgba(231, 223, 208, 0.62);
      --accent: #5af0a6;
      --warm: #ffb347;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      --card-radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Bahnschrift", "Segoe UI Variable", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(18, 72, 52, 0.22), transparent 32%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
    }

    body {
      overflow-y: scroll;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      background: rgba(4, 11, 9, 0.92);
      border-bottom: 1px solid rgba(111, 179, 143, 0.12);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(90, 240, 166, 0.18), rgba(255, 179, 71, 0.12));
      border: 1px solid rgba(90, 240, 166, 0.16);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-copy strong {
      display: block;
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .brand-copy span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip,
    .ghost-button {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      min-height: 38px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .chip {
      color: var(--muted);
    }

    .ghost-button {
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .ghost-button:hover {
      transform: translateY(-1px);
      border-color: rgba(90, 240, 166, 0.18);
      background: rgba(90, 240, 166, 0.08);
    }

    .page {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: 28px 0 52px;
    }

    .status-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 22px;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(23, 25, 13, 0.68);
      border: 1px solid rgba(189, 135, 41, 0.2);
      color: rgba(255, 190, 90, 0.88);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .status-line.hidden {
      display: none;
    }

    .gallery {
      column-count: 4;
      column-gap: 16px;
    }

    .card {
      position: relative;
      display: inline-block;
      width: 100%;
      margin: 0 0 16px;
      border-radius: var(--card-radius);
      overflow: hidden;
      cursor: pointer;
      background: #111;
      box-shadow: var(--shadow);
      break-inside: avoid;
      transform: translateZ(0);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 28px 72px rgba(0, 0, 0, 0.56);
    }

    .card img {
      width: 100%;
      display: block;
      object-fit: cover;
      background: #0a0a0a;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 8px;
      padding: 14px;
      background: linear-gradient(180deg, transparent 38%, rgba(0, 0, 0, 0.18) 55%, rgba(0, 0, 0, 0.74) 100%);
    }

    .card-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.02;
      letter-spacing: 0.01em;
    }

    .card-prompt {
      margin: 0;
      color: rgba(241, 235, 226, 0.8);
      font-size: 11px;
      line-height: 1.45;
      font-family: "Consolas", "SFMono-Regular", monospace;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-wrap;
    }

    .card-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .tag {
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(245, 240, 230, 0.84);
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .copy-button {
      border: 0;
      border-radius: 10px;
      min-height: 28px;
      padding: 0 10px;
      background: rgba(255, 255, 255, 0.14);
      color: #f3efe8;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: background 140ms ease;
    }

    .copy-button:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .empty {
      min-height: 52vh;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(255, 255, 255, 0.12);
      border-radius: 28px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.86);
      backdrop-filter: blur(18px);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 24px;
      z-index: 3;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      width: 44px;
      height: 64px;
      border: 0;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.14);
      color: var(--text);
      font-size: 28px;
      cursor: pointer;
    }

    .lightbox-nav.prev {
      left: 24px;
    }

    .lightbox-nav.next {
      right: 24px;
    }

    .lightbox-stage {
      width: min(1280px, calc(100vw - 96px));
      height: min(90vh, 980px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .lightbox-media {
      max-width: 100%;
      max-height: 100%;
      border-radius: 18px;
      display: block;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
      object-fit: contain;
    }

    .lightbox-info {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: min(860px, calc(100% - 80px));
      padding: 16px 18px 18px;
      border-radius: 18px;
      background: rgba(8, 8, 8, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
    }

    .lightbox-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .lightbox-title {
      margin: 0;
      font-size: 18px;
    }

    .lightbox-copy {
      border: 0;
      border-radius: 12px;
      min-height: 32px;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .lightbox-prompt {
      margin: 0;
      color: rgba(245, 239, 230, 0.82);
      font-size: 12px;
      line-height: 1.55;
      font-family: "Consolas", "SFMono-Regular", monospace;
      white-space: pre-wrap;
      max-height: 24vh;
      overflow: auto;
    }

    @media (max-width: 1180px) {
      .gallery {
        column-count: 3;
      }
    }

    @media (max-width: 860px) {
      .gallery {
        column-count: 2;
      }

      .lightbox-stage {
        width: calc(100vw - 36px);
        height: calc(100vh - 36px);
      }

      .lightbox-info {
        width: calc(100% - 26px);
      }
    }

    @media (max-width: 640px) {
      .topbar {
        padding: 16px;
      }

      .page {
        width: calc(100% - 24px);
        padding-top: 18px;
      }

      .gallery {
        column-count: 1;
      }

      .brand-copy strong {
        font-size: 16px;
      }

      .brand-copy span {
        font-size: 12px;
      }

      .status-line {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">DH</div>
      <div class="brand-copy">
        <strong>dark HUB Showcase</strong>
        <span>image-first prompt browser</span>
      </div>
    </div>

    <div class="topbar-actions">
      <div id="sourceChip" class="chip">Local catalog</div>
      <button id="reloadButton" class="ghost-button">Reload</button>
    </div>
  </header>

  <main class="page">
    <div id="statusLine" class="status-line hidden"></div>
    <section id="gallery" class="gallery"></section>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button id="closeButton" class="lightbox-close" aria-label="Close preview">×</button>
    <button id="prevButton" class="lightbox-nav prev" aria-label="Previous prompt">‹</button>
    <button id="nextButton" class="lightbox-nav next" aria-label="Next prompt">›</button>

    <div class="lightbox-stage">
      <img id="lightboxImage" class="lightbox-media" src="./catalog/previews/placeholder.svg" alt="Prompt preview">

      <div class="lightbox-info">
        <div class="lightbox-head">
          <h2 id="lightboxTitle" class="lightbox-title">Prompt</h2>
          <button id="lightboxCopy" class="lightbox-copy">Copy Prompt</button>
        </div>
        <pre id="lightboxPrompt" class="lightbox-prompt"></pre>
      </div>
    </div>
  </div>

  <script type="module" src="./showcase.js"></script>
</body>
</html>
